<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script
        src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
</head>

<body>
    <div style="flex: 1; height: 500px; width: 1000px;">
        <h2>Graphique 1 - Histogramme</h2>
        <canvas id="chart1"></canvas>
    </div>
    <br>
    <br>
    <div style="flex: 1; height: 500px; width: 1000px;">
        <h2>Graphique 2 - Courbe</h2>
        <canvas id="chart2"></canvas>
    </div>
    <br>
    <br>
    <div style="flex: 1; height: 500px; width: 1000px;">
        <h2>Graphique 3 - CourbeTemps</h2>
        <canvas id="chart3"></canvas>
    </div>
    <br>
    <br>
    <div style="flex: 1; height: 500px; width: 1000px;">
        <h2>Graphique 4 - CourbeTemps</h2>
        <canvas id="chart4"></canvas>
    </div>
    <br>
    <br>
    <div style="flex: 1; height: 500px; width: 1000px;">
        <h2>Graphique 5 - Radar</h2>
        <canvas id="chart5"></canvas>
    </div>
    <select name="colors" id="col-select">
        <option value="#e6362270">Red</option>
        <option value="#22a1e670">Blue</option>
        <option value="#1cad4770">Green</option>
        <option value="#ffee0070">Yellow</option>
    </select>
    <select name="datasets" id="data-select">
        <option value="0">Dataset 1</option>
        <option value="1">Dataset 2</option>
    </select>
    </div>
</body>

<script>
    let data = [10, 8, 30, 20, 12, 5];
    let labels = ["janv", "fév", "mar", "avr", "mai", "juin"];


    // Graphique 1 - Histogramme
    let ctx1 = document.getElementById('chart1');
    new Chart(ctx1, {
        type: 'bar',
        data: {
            labels: ["A", "B", "C"],
            datasets: [{
                label: 'data 1',
                data: [10, 20, 30],
                backgroundColor: "red"
            },
            {
                label: 'data 2',
                data: [5, 8, 45],
                backgroundColor: "rgba(15, 0, 102, 0.4)"
            },
            {
                label: 'data 3',
                data: [8, 10, 7],
                backgroundColor: "#03befc"
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false
        }
    });

    // Graphique 2 - Courbe
    let ctx2 = document.getElementById('chart2');
    new Chart(ctx2, {
        type: 'line',
        data: {
            labels: labels,
            datasets: [{
                label: 'data',
                data: data,
                fill: true,
                pointRadius: 0
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            scales: {
                y: { min: 0, max: 50, type: 'logarithmic' }
            }
        }
    });

    let data2 = [{ x: '2023-01-01 08:00:00', y: 20 },
    { x: '2023-01-01 10:00:00', y: 30 },
    { x: '2023-01-01 12:00:00', y: 50 },
    { x: '2023-01-01 14:00:00', y: 20 },
    { x: '2023-01-01 16:00:00', y: 75 },
    { x: '2023-01-01 18:00:00', y: 62 }]

    let dataPie = {
        labels: [
            'Red',
            'Blue',
            'Yellow'
        ],
        datasets: [{
            label: 'My First Dataset',
            data: [300, 50, 100],
            backgroundColor: [
                'rgb(255, 99, 132)',
                'rgb(54, 162, 235)',
                'rgb(255, 205, 86)'
            ],
            hoverOffset: 4
        }]
    };

    // Graphique 3 - CourbeTemps
    let ctx3 = document.getElementById('chart3');
    new Chart(ctx3, {
        type: 'line',
        data: {
            datasets: [{
                label: 'data over time',
                data: data2,
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            scales: {
                x: { type: 'time', time: { unit: 'hour' } },
                y: { min: 0, max: 100 }
            }
        }
    });

    // Graphique 4 - Pie
    let ctx4 = document.getElementById('chart4');
    new Chart(ctx4, {
        type: 'pie',
        data: dataPie,
        options: {
            responsive: true,
            maintainAspectRatio: false
        },
    });

    // Graphique 5 - Radar
    const DATASETS = [[8, 4, 5, 6, 10, 5], [5, 1, 8, 3, 7, 2]]
    let ctx5 = document.getElementById('chart5');

    let chart = new Chart(ctx5, {
        type: 'radar',
        data: {
            labels: ["A", "B", "C", "D", "E", "F"],
            datasets: [{
                label: 'data',
                data: DATASETS[0],
                backgroundColor: "#e6362270",
                borderWidth: 0,

                pointRadius: 0
            }]
        },
        options: {
            scale: { min: 0, max: 10 }
        }
    });

    function handleDataChange(chart, datasetIndex) {
        chart.data.datasets[0].data = DATASETS[datasetIndex];
        chart.update();
    }

    function changeColor(chart, datasetIndex) {
        chart.data.datasets[0].backgroundColor = backgroundColor = datasetIndex;
        chart.update();
    }

    const datasetSel = document.getElementById("data-select");
    datasetSel.onchange = () => { handleDataChange(chart, datasetSel.value) };

    const colorSel = document.getElementById("col-select");
    colorSel.onchange = () => { changeColor(chart, colorSel.value) };
</script>


</html>
